<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1200" role="img" aria-label="rpiv-web-tools — Brave-backed web search and fetch for Pi Agent" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-web-tools — Brave-backed web search and fetch for Pi Agent</title>
  <defs>
    <style>
      .mono   { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink    { fill: #F4EFE6; }
      .paper  { fill: #0E0D0B; }
      .muted  { fill: #7A7468; }
      .dim    { fill: #4A463F; }
      .accent { fill: #FF7A3D; }
      .mint   { fill: #6FD0B8; }
      .rule   { stroke: #2A2620; }
      .rule-bright { stroke: #FF7A3D; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="29"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.06 0"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 H0 V32" fill="none" stroke="#161411" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="#231F1A"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#0E0D0B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="540" height="1200" class="paper"/>
  <rect width="540" height="1200" fill="url(#grid)" opacity="0.55"/>
  <rect width="540" height="1200" fill="url(#dots)" opacity="0.4"/>
  <rect width="540" height="1200" filter="url(#grain)" opacity="0.5"/>
  <rect width="540" height="1200" fill="url(#vignette)"/>

  <g class="rule-bright" stroke-width="1" fill="none" opacity="0.95">
    <path d="M24 56 L40 56 M40 40 L40 56"/>
    <path d="M516 56 L500 56 M500 40 L500 56"/>
    <path d="M24 1144 L40 1144 M40 1160 L40 1144"/>
    <path d="M516 1144 L500 1144 M500 1160 L500 1144"/>
  </g>

  <line x1="40" y1="56" x2="500" y2="56" class="rule" stroke-width="1"/>
  <text class="mono muted" x="40"  y="44" font-size="9" letter-spacing="2">@JUICESHARP &#183; PI EXTENSION &#183; NO. 007 &#8211; WEB</text>
  <text class="mono muted" x="500" y="44" font-size="9" letter-spacing="2" text-anchor="end">MIT &#183; v0.9 &#183; 540 &#215; 1200</text>

  <text class="mono ink" x="40" y="124" font-size="56" font-weight="700" letter-spacing="-2">rpiv<tspan class="accent">-</tspan>web-tools</text>
  <line x1="40" y1="138" x2="100" y2="138" class="rule-bright" stroke-width="2"/>
  <text class="mono muted" x="40" y="160" font-size="12" letter-spacing="0.3">Search the web and read pages.</text>
  <text class="mono dim"   x="40" y="178" font-size="9" letter-spacing="1.4">BRAVE-BACKED &#183; HTML &#8594; TEXT &#183; TRUNCATE-WITH-SPILL</text>

  <text class="mono muted" x="40"  y="222" font-size="9" letter-spacing="2">FIG. 01 &#8212; SEARCH &amp; FETCH</text>
  <text class="mono muted" x="500" y="222" font-size="9" letter-spacing="2" text-anchor="end">web_search() &#8226; web_fetch()</text>
  <line x1="40" y1="232" x2="500" y2="232" class="rule" stroke-width="0.75"/>

  <!-- HERO: 001 web_search stack, 002 web_fetch stack -->

  <!-- 001 web_search -->
  <text class="mono dim" x="40" y="270" font-size="9" letter-spacing="1.8">001 &#8212; web_search</text>

  <g transform="translate(40 282)">
    <rect x="0" y="0" width="460" height="36" fill="#15120E" stroke="#2A2620" stroke-width="1"/>
    <text class="mono accent" x="14" y="22" font-size="13" font-weight="700">&#9906;</text>
    <text class="mono muted"  x="34" y="22" font-size="11">{ q: <tspan class="ink">"sse vs websockets"</tspan>, count: 3 }</text>
    <rect x="416" y="6" width="36" height="24" fill="#1B0F08" stroke="#FF7A3D" stroke-width="0.75"/>
    <text class="mono accent" x="434" y="22" font-size="10" text-anchor="middle" font-weight="700">GET</text>
  </g>

  <!-- result rows -->
  <g transform="translate(40 332)">
    <!-- result 1 -->
    <text class="mono accent" x="0"  y="14" font-size="11" font-weight="700" letter-spacing="1.4">01</text>
    <text class="mono ink"    x="22" y="14" font-size="11" font-weight="700">Server-Sent Events vs WebSockets</text>
    <text class="mono mint"   x="22" y="28" font-size="9.5">developer.mozilla.org/&#8230;/Server-sent_events</text>
    <text class="mono muted"  x="22" y="42" font-size="9.5">SSE is a one-way push channel from server to</text>
    <text class="mono muted"  x="22" y="54" font-size="9.5">browser; WS is full-duplex&#8230;</text>

    <line x1="0" y1="64" x2="460" y2="64" class="rule" stroke-width="0.5" stroke-dasharray="1 3"/>

    <!-- result 2 -->
    <text class="mono accent" x="0"  y="80" font-size="11" font-weight="700" letter-spacing="1.4">02</text>
    <text class="mono ink"    x="22" y="80" font-size="11" font-weight="700">When to choose SSE over WebSockets</text>
    <text class="mono mint"   x="22" y="94" font-size="9.5">ably.com/blog/sse-vs-websockets</text>
    <text class="mono muted"  x="22" y="108" font-size="9.5">SSE is simpler to scale through proxies and</text>
    <text class="mono muted"  x="22" y="120" font-size="9.5">survives network blips&#8230;</text>

    <line x1="0" y1="130" x2="460" y2="130" class="rule" stroke-width="0.5" stroke-dasharray="1 3"/>

    <!-- result 3 -->
    <text class="mono accent" x="0"  y="146" font-size="11" font-weight="700" letter-spacing="1.4">03</text>
    <text class="mono ink"    x="22" y="146" font-size="11" font-weight="700">EventSource: a tour through the standard</text>
    <text class="mono mint"   x="22" y="160" font-size="9.5">html.spec.whatwg.org/&#8230;/server-sent-events</text>
    <text class="mono muted"  x="22" y="174" font-size="9.5">The browser auto-reconnects with</text>
    <text class="mono muted"  x="22" y="186" font-size="9.5">Last-Event-ID, replaying missed&#8230;</text>
  </g>

  <text class="mono dim" x="40" y="544" font-size="8.5" letter-spacing="1.4">api.search.brave.com &#183; X-Subscription-Token</text>

  <!-- divider -->
  <line x1="40" y1="568" x2="500" y2="568" class="rule" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 002 web_fetch -->
  <text class="mono dim" x="40" y="600" font-size="9" letter-spacing="1.8">002 &#8212; web_fetch</text>

  <g transform="translate(40 612)">
    <rect x="0" y="0" width="460" height="36" fill="#15120E" stroke="#2A2620" stroke-width="1"/>
    <text class="mono accent" x="14" y="22" font-size="13" font-weight="700">&#8623;</text>
    <text class="mono muted"  x="34" y="22" font-size="10.5">{ url: <tspan class="ink">"https://&#8230;ably.com/blog&#8230;"</tspan> }</text>
    <rect x="402" y="6" width="50" height="24" fill="#1B0F08" stroke="#FF7A3D" stroke-width="0.75"/>
    <text class="mono accent" x="427" y="22" font-size="10" text-anchor="middle" font-weight="700">200 OK</text>
  </g>

  <text class="mono dim" x="40" y="678" font-size="9" letter-spacing="1.8">HTML &#8594; TEXT</text>
  <g transform="translate(40 686)">
    <rect x="0" y="0" width="460" height="120" fill="#0E0D0B" stroke="#221E18" stroke-width="0.6"/>
    <text class="mono ink"   x="14" y="22" font-size="11"># When to choose SSE over WebSockets</text>
    <text class="mono muted" x="14" y="42" font-size="11">SSE is a one-way push from server to browser.</text>
    <text class="mono muted" x="14" y="58" font-size="11">It survives most corporate proxies and</text>
    <text class="mono muted" x="14" y="74" font-size="11">traverses CDN layers without renegotiation,</text>
    <text class="mono muted" x="14" y="90" font-size="11">which makes it&#8230;</text>
    <text class="mono dim"   x="14" y="108" font-size="11">&#8230; (88 lines)</text>
  </g>

  <!-- spillover banner -->
  <g transform="translate(40 822)">
    <rect x="0" y="0" width="460" height="48" fill="#15120E" stroke="#FF7A3D" stroke-width="1"/>
    <text class="mono accent" x="14" y="20" font-size="10" letter-spacing="1.4" font-weight="700">[ TRUNCATED &#8226; SHOWING 64 of 988 LINES ]</text>
    <text class="mono muted"  x="14" y="38" font-size="10">full body &#8594; <tspan class="mint">/tmp/rpiv-fetch-Xa9k/content.txt</tspan></text>
  </g>

  <!-- attribution -->
  <text class="mono dim" x="40"  y="900" font-size="8.5" letter-spacing="1.4">env: BRAVE_SEARCH_API_KEY (wins)</text>
  <text class="mono dim" x="40"  y="916" font-size="8.5" letter-spacing="1.4">cfg: ~/.config/rpiv-web-tools/config.json &#8226; chmod 0600</text>

  <line x1="40" y1="1100" x2="500" y2="1100" class="rule" stroke-width="0.5" stroke-dasharray="1 3"/>
  <text class="mono muted" x="40"  y="1118" font-size="9" letter-spacing="1.8">SEARCH &#183; FETCH &#183; SPILL</text>

  <line x1="40" y1="1144" x2="500" y2="1144" class="rule" stroke-width="1"/>
  <text class="mono muted" x="40"  y="1168" font-size="9" letter-spacing="1.6">
    <tspan class="accent">&#9654;</tspan>  pi install npm:@juicesharp/rpiv-web-tools
  </text>
  <text class="mono muted" x="500" y="1168" font-size="9" letter-spacing="2" text-anchor="end">FETCH</text>
</svg>

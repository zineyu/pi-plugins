<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-i18n — i18n for any Pi extension in 3 lines" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-i18n — i18n for any Pi extension in 3 lines</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .serif { font-family: 'Iowan Old Style', 'Hoefler Text', Charter, 'Source Serif Pro', Georgia, serif; }
      .ink { fill: #ede6d3; }
      .text-quiet { fill: #a8a29e; }
      .text-distant { fill: #9c968d; }
      .ochre { fill: #a8896c; }
      .sage { fill: #8a9580; }
      .sage-deep { fill: #5e6b56; }
    </style>
    <radialGradient id="wash-ochre" cx="25%" cy="10%" r="65%">
      <stop offset="0%" stop-color="#a8896c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a8896c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash-sage" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#8a9580" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8a9580" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="#1c1a17"/>
  <rect width="1280" height="800" fill="url(#wash-ochre)"/>
  <rect width="1280" height="800" fill="url(#wash-sage)"/>

  <g fill="none" stroke="#8a9580" stroke-linecap="round" opacity="0.45">
    <path d="M1120 60 q36 -52 88 -60 q40 -5 68 14" stroke-width="1.1"/>
    <path d="M1140 80 q28 -18 60 -14 q24 3 42 14" stroke-width="0.7" opacity="0.6"/>
    <circle cx="1210" cy="32" r="2" opacity="0.5"/>
    <circle cx="1160" cy="60" r="1.4" opacity="0.4"/>
  </g>

  <text class="mono text-distant" x="80" y="64" font-size="11" letter-spacing="0.18em">PI AGENT EXTENSION</text>

  <text class="serif ink" x="80" y="152" font-size="80" font-weight="700" letter-spacing="-2.5">rpiv<tspan class="ochre">-</tspan>i18n</text>
  <text class="mono text-quiet" x="80" y="196" font-size="19" letter-spacing="0.2">i18n for any Pi extension — in 3 lines.</text>

  <line x1="80" y1="228" x2="1200" y2="228" stroke="#2e2b27" stroke-width="1"/>

  <rect x="80" y="264" width="1120" height="440" rx="3" fill="#1c1a17" stroke="#3a3631" stroke-width="1"/>

  <!-- Locales strip -->
  <text class="mono text-distant" x="120" y="300" font-size="11" letter-spacing="0.2em">LOCALES</text>

  <rect x="220" y="284" width="68" height="24" rx="2" fill="#2d2925" stroke="#8a9580" stroke-width="1.2"/>
  <text class="mono sage" x="254" y="301" font-size="13" font-weight="700" text-anchor="middle" xml:space="preserve">&#10003; EN</text>

  <rect x="296" y="284" width="56" height="24" rx="2" fill="none" stroke="#3a3631" stroke-width="1"/>
  <text class="mono text-distant" x="324" y="301" font-size="13" text-anchor="middle">DE</text>

  <text class="mono text-distant" x="364" y="301" font-size="12" letter-spacing="0.1em">+ any other</text>

  <text class="mono text-distant" x="1160" y="301" font-size="11" letter-spacing="0.15em" text-anchor="end">/languages &#183; --locale</text>

  <line x1="120" y1="324" x2="1160" y2="324" stroke="#2e2b27" stroke-width="1"/>

  <!-- 01 register -->
  <text class="mono text-distant" x="120" y="372" font-size="11" letter-spacing="0.2em">01</text>
  <text class="mono" x="170" y="372" font-size="22"><tspan class="ochre" font-weight="700">registerStrings</tspan><tspan class="text-quiet">(</tspan><tspan class="sage">'@me/tool'</tspan><tspan class="text-quiet">, { </tspan><tspan class="sage">en</tspan><tspan class="text-quiet">, </tspan><tspan class="sage">de</tspan><tspan class="text-quiet"> })</tspan></text>

  <text class="mono sage" x="170" y="412" font-size="22" font-weight="700">&#8595;</text>

  <!-- 02 scope -->
  <text class="mono text-distant" x="120" y="460" font-size="11" letter-spacing="0.2em">02</text>
  <text class="mono" x="170" y="460" font-size="22"><tspan class="text-distant">const </tspan><tspan class="ink" font-weight="700">t</tspan><tspan class="text-distant"> = </tspan><tspan class="ochre" font-weight="700">scope</tspan><tspan class="text-quiet">(</tspan><tspan class="sage">'@me/tool'</tspan><tspan class="text-quiet">)</tspan></text>

  <text class="mono sage" x="170" y="500" font-size="22" font-weight="700">&#8595;</text>

  <!-- 03 translate -->
  <text class="mono text-distant" x="120" y="548" font-size="11" letter-spacing="0.2em">03</text>
  <text class="mono" x="170" y="548" font-size="22"><tspan class="ink" font-weight="700">t</tspan><tspan class="text-quiet">(</tspan><tspan class="sage">'hint.enter'</tspan><tspan class="text-quiet">, </tspan><tspan class="sage">'Enter to select'</tspan><tspan class="text-quiet">)</tspan></text>

  <text class="mono" x="170" y="586" font-size="20"><tspan class="text-distant">&#10142;  </tspan><tspan class="sage" font-weight="700">"Eingabe zum Auswählen"</tspan></text>

  <!-- Caption -->
  <text class="mono" x="120" y="660" font-size="13" letter-spacing="0.12em"><tspan class="sage" font-weight="700">[3 lines]</tspan>  <tspan class="text-distant">REGISTER &#183; SCOPE &#183; TRANSLATE &#183; ENGLISH FALLBACK PER KEY</tspan></text>

  <line x1="80" y1="740" x2="1200" y2="740" stroke="#2e2b27" stroke-width="1"/>

  <text class="mono text-distant" x="80" y="776" font-size="12" letter-spacing="0.12em">
    <tspan class="ochre" font-weight="700">&#9612; rpiv-i18n</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12" class="sage">EN &#183; DE &#183; + any other</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12">npm:@juicesharp/rpiv-i18n</tspan>
  </text>
</svg>

  <text class="mono sage" x="120" y="316" font-size="24">&#9679;  Todos (2/7)</text>

  <text class="mono" x="160" y="372" font-size="21"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="text-distant" text-decoration="line-through">&#10003;  Create DemoTodo domain entity</tspan></text>
  <text class="mono" x="160" y="404" font-size="21"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="text-distant" text-decoration="line-through">&#10003;  Create IDemoTodoRepository interface</tspan></text>

  <text class="mono" x="160" y="456" font-size="21" xml:space="preserve"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="washi-soft">&#9680;</tspan>  <tspan class="ink">Create DemoTodoRepository in Infrastructure</tspan>  <tspan class="text-distant">(creating impl&#8230;)</tspan></text>

  <text class="mono" x="160" y="500" font-size="21" xml:space="preserve"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="text-distant">&#9675;</tspan>  <tspan class="ink">Create DemoTodoService in Application layer</tspan></text>
  <text class="mono" x="160" y="536" font-size="21" xml:space="preserve"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="text-distant">&#9675;</tspan>  <tspan class="ink">Create DemoTodosController in Web.Api</tspan></text>
  <text class="mono" x="160" y="572" font-size="21" xml:space="preserve"><tspan class="text-distant">&#9500;&#9472; </tspan><tspan class="text-distant">&#9675;</tspan>  <tspan class="ink">Register DemoTodo services in DI container</tspan></text>
  <text class="mono" x="160" y="608" font-size="21" xml:space="preserve"><tspan class="text-distant">&#9492;&#9472; </tspan><tspan class="text-distant">&#9675;</tspan>  <tspan class="ink">Write unit and integration tests</tspan></text>

  <text class="mono text-distant" x="120" y="678" font-size="12" letter-spacing="0.2em">SURVIVES /reload + /compact &#183; LIVE OVERLAY &#183; DEPENDENCY GRAPH</text>

  <line x1="80" y1="740" x2="1200" y2="740" stroke="#2e2b27" stroke-width="1"/>

  <text class="mono text-distant" x="80" y="776" font-size="12" letter-spacing="0.12em">
    <tspan class="ochre" font-weight="700">&#9612; rpiv-todo</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12" class="sage">2/7 done</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12">npm:@juicesharp/rpiv-todo</tspan>

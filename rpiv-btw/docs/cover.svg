<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-btw — Side questions without polluting the main conversation" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-btw — Side questions without polluting the main conversation</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .serif { font-family: 'Iowan Old Style', 'Hoefler Text', Charter, 'Source Serif Pro', Georgia, serif; }
      .ink { fill: #ede6d3; }
      .text-quiet { fill: #a8a29e; }
      .text-distant { fill: #9c968d; }
      .ochre { fill: #a8896c; }
      .sage { fill: #8a9580; }
    </style>
    <radialGradient id="wash-ochre" cx="25%" cy="10%" r="65%">
      <stop offset="0%" stop-color="#a8896c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a8896c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash-sage" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#8a9580" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8a9580" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <rect width="1280" height="800" fill="#1c1a17"/>
  <rect width="1280" height="800" fill="url(#wash-ochre)"/>
  <rect width="1280" height="800" fill="url(#wash-sage)"/>

  <g fill="none" stroke="#8a9580" stroke-linecap="round" opacity="0.45">
    <path d="M1120 60 q36 -52 88 -60 q40 -5 68 14" stroke-width="1.1"/>
    <path d="M1140 80 q28 -18 60 -14 q24 3 42 14" stroke-width="0.7" opacity="0.6"/>
    <circle cx="1210" cy="32" r="2" opacity="0.5"/>
    <circle cx="1160" cy="60" r="1.4" opacity="0.4"/>
  </g>

  <text class="mono text-distant" x="80" y="64" font-size="11" letter-spacing="0.18em">PI AGENT EXTENSION</text>

  <text class="serif ink" x="80" y="152" font-size="80" font-weight="700" letter-spacing="-2.5">rpiv<tspan class="ochre">-</tspan>btw</text>
  <text class="mono text-quiet" x="80" y="196" font-size="19" letter-spacing="0.2">Side question. Zero pollution.</text>

  <line x1="80" y1="228" x2="1200" y2="228" stroke="#2e2b27" stroke-width="1"/>

  <rect x="80" y="264" width="1120" height="440" rx="3" fill="#1c1a17" stroke="#3a3631" stroke-width="1"/>

  <!-- Conversation thread -->
  <g opacity="0.5">
    <text class="mono" x="120" y="330" font-size="18"><tspan class="text-distant">user      &#8250;</tspan> <tspan class="text-distant">let&#8217;s migrate the websocket layer to SSE</tspan></text>
    <text class="mono" x="120" y="360" font-size="18"><tspan class="text-distant">assistant &#8250;</tspan> <tspan class="text-distant">on it &#8212; reading current transport&#8230;</tspan></text>
  </g>
  <line x1="120" y1="392" x2="1160" y2="392" stroke="#2e2b27" stroke-dasharray="2 6"/>

  <!-- /btw command -->
  <text class="mono" x="120" y="440" font-size="20"><tspan class="sage" font-weight="700">&#10095;</tspan> <tspan class="ochre" font-weight="700">/btw</tspan> <tspan class="ink">why did we switch from sockets to SSE?</tspan></text>

  <!-- Response -->
  <text class="mono" x="120" y="492" font-size="18"><tspan class="text-distant">  &#8250; resilience: SSE survives proxies that drop ws,</tspan></text>
  <text class="mono" x="120" y="520" font-size="18"><tspan class="text-distant">    and the team was tired of the ping-pong reconnect.</tspan></text>
  <text class="mono" x="120" y="564" font-size="18"><tspan class="text-distant">  &#8250;</tspan> <tspan class="sage" font-weight="700">EPHEMERAL &#183; NEVER WRITTEN</tspan></text>

  <!-- Caption -->
  <text class="mono text-distant" x="120" y="634" font-size="12" letter-spacing="0.2em">READ-ONLY BRANCH CLONE &#183; OWN AbortController &#183; tools: []</text>

  <line x1="80" y1="740" x2="1200" y2="740" stroke="#2e2b27" stroke-width="1"/>

  <text class="mono text-distant" x="80" y="776" font-size="12" letter-spacing="0.12em">
    <tspan class="ochre" font-weight="700">&#9612; rpiv-btw</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12" class="sage">ephemeral</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12">npm:@juicesharp/rpiv-btw</tspan>
  </text>
</svg>
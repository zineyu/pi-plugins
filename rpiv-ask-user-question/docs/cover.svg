<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-ask-user-question — Structured clarifying questions instead of guessing" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-ask-user-question — Structured clarifying questions instead of guessing</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .serif { font-family: 'Iowan Old Style', 'Hoefler Text', Charter, 'Source Serif Pro', Georgia, serif; }
      .ink { fill: #ede6d3; }
      .text-quiet { fill: #a8a29e; }
      .text-distant { fill: #9c968d; }
      .ochre { fill: #a8896c; }
      .sage { fill: #8a9580; }
      .sage-deep { fill: #5e6b56; }
    </style>
    <radialGradient id="wash-ochre" cx="25%" cy="10%" r="65%">
      <stop offset="0%" stop-color="#a8896c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a8896c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash-sage" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#8a9580" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8a9580" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <rect width="1280" height="800" fill="#1c1a17"/>
  <rect width="1280" height="800" fill="url(#wash-ochre)"/>
  <rect width="1280" height="800" fill="url(#wash-sage)"/>

  <g fill="none" stroke="#8a9580" stroke-linecap="round" opacity="0.45">
    <path d="M1120 60 q36 -52 88 -60 q40 -5 68 14" stroke-width="1.1"/>
    <path d="M1140 80 q28 -18 60 -14 q24 3 42 14" stroke-width="0.7" opacity="0.6"/>
    <circle cx="1210" cy="32" r="2" opacity="0.5"/>
    <circle cx="1160" cy="60" r="1.4" opacity="0.4"/>
  </g>

  <text class="mono text-distant" x="80" y="64" font-size="11" letter-spacing="0.18em">PI AGENT EXTENSION</text>

  <text class="serif ink" x="80" y="152" font-size="72" font-weight="700" letter-spacing="-2.5">rpiv<tspan class="ochre">-</tspan>ask<tspan class="ochre">-</tspan>user<tspan class="ochre">-</tspan>question</text>
  <text class="mono text-quiet" x="80" y="196" font-size="19" letter-spacing="0.2">Structured clarifying questions instead of guessing.</text>

  <line x1="80" y1="222" x2="1200" y2="222" stroke="#2e2b27" stroke-width="1"/>

  <rect x="80" y="246" width="1120" height="476" rx="3" fill="#1c1a17" stroke="#3a3631" stroke-width="1"/>

  <!-- Questionnaire mockup inside card -->
  <line x1="120" y1="296" x2="1160" y2="296" stroke="#3a3631" stroke-width="1"/>

  <!-- Tab bar -->
  <text class="mono text-distant" x="120" y="334" font-size="18">&#8592;</text>
  <rect x="158" y="312" width="240" height="32" fill="#2d2925" stroke="#8a9580" stroke-width="1" rx="2"/>
  <text class="mono" x="172" y="334" font-size="18"><tspan class="sage">&#9633;</tspan> <tspan class="sage" font-weight="700">Feature Type</tspan></text>
  <text class="mono text-distant" x="416" y="334" font-size="18" xml:space="preserve">&#9633; Design    &#9633; Testing    <tspan class="ink">&#10003; Submit</tspan></text>
  <text class="mono text-distant" x="1144" y="334" font-size="18">&#8594;</text>

  <!-- Question -->
  <text class="mono ink" x="120" y="396" font-size="20" font-weight="700">Which real development task are we planning right now?</text>

  <!-- Options -->
  <text class="mono sage" x="120" y="448" font-size="20" font-weight="700" xml:space="preserve">&#10095;  1.  Bug fix (Recommended)</text>
  <text class="mono text-quiet" x="170" y="474" font-size="18">Patch a production issue with minimal risk and clear rollback path.</text>

  <text class="mono ink" x="120" y="516" font-size="20" font-weight="700" xml:space="preserve">   2.  New feature</text>
  <text class="mono text-quiet" x="170" y="542" font-size="18">Implement a user-facing capability across API, UI, and tests.</text>

  <text class="mono ink" x="120" y="584" font-size="20" font-weight="700" xml:space="preserve">   3.  Refactor</text>
  <text class="mono text-quiet" x="170" y="610" font-size="18">Improve maintainability without changing external behavior.</text>

  <line x1="120" y1="642" x2="1160" y2="642" stroke="#2e2b27" stroke-width="1"/>
  <text class="mono text-distant" x="120" y="670" font-size="20" xml:space="preserve">   4.  Chat about this</text>

  <text class="mono text-distant" x="120" y="702" font-size="14">Enter to select  &#183;  &#8593;/&#8595; to navigate  &#183;  Tab to switch  &#183;  Esc to cancel</text>

  <line x1="80" y1="752" x2="1200" y2="752" stroke="#2e2b27" stroke-width="1"/>

  <text class="mono text-distant" x="80" y="778" font-size="12" letter-spacing="0.12em">
    <tspan class="ochre" font-weight="700">&#9612; rpiv-ask-user-question</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12" class="sage">q 1/4</tspan>
    <tspan dx="12">&#9474;</tspan>
    <tspan dx="12">npm:@juicesharp/rpiv-ask-user-question</tspan>
  </text>
</svg>
